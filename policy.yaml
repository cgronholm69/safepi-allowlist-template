# ============================================================
# SafePi Policy Configuration
# ============================================================
# REQUIREMENT: SafeList Sync™ must be enabled in the SafePi WebUI
# (SafeList Sync™ → Enable Git-based Allowlist Sync)
# and this file must be placed alongside your allowlist.txt in
# the same GitHub repository.
#
# SafePi checks this file every 5 minutes for schedule changes.
#
# If no schedules are active, SafePi uses allowlist.txt at all times.
# ============================================================

# ------------------------------------------------------------
# SCHEDULES
# Define time windows and which allowlist applies during each.
# Windows are evaluated top-to-bottom; first match wins.
# A 'default' entry (no days/time) acts as the catch-all when
# no other window matches.
#
# allowlist: filename   — serve this allowlist file
# allowlist: none       — block all outbound traffic
#
# HOW TO ACTIVATE SCHEDULING:
#   Every YAML line below starts with a # and is ignored by SafePi.
#   To activate, remove the # from each YAML line — instructions
#   are printed above each line that needs to be uncommented.
#
# ⚠️  Edit days and times BEFORE removing the # characters.
#     Wrong times will block or allow access unexpectedly.
# ------------------------------------------------------------

# --- SIMPLE SCHEDULE (use this OR the advanced example below, not both) ---

# REMOVE THE # FROM THE LINE BELOW
# schedules:

# REMOVE THE # FROM THE LINE BELOW
#   - name: opening_hours
# REMOVE THE # FROM THE LINE BELOW — edit days to match yours
#     days: [mon, tue, wed, thu, fri]
# REMOVE THE # FROM THE LINE BELOW — edit time to match yours
#     time: "09:00-17:00"
# REMOVE THE # FROM THE LINE BELOW
#     allowlist: allowlist.txt

# REMOVE THE # FROM THE LINE BELOW
#   - name: default
# REMOVE THE # FROM THE LINE BELOW
#     allowlist: none


# --- ADVANCED EXAMPLE (a library with staffed hours, self-service, and closed nights) ---
# Use this OR the simple schedule above, not both.

# REMOVE THE # FROM THE LINE BELOW
# schedules:

# REMOVE THE # FROM THE LINE BELOW
#   - name: weekday_open
# REMOVE THE # FROM THE LINE BELOW — edit days to match yours
#     days: [mon, tue, wed, thu, fri]
# REMOVE THE # FROM THE LINE BELOW — edit time to match yours
#     time: "09:00-19:00"
# REMOVE THE # FROM THE LINE BELOW
#     allowlist: allowlist.txt

# REMOVE THE # FROM THE LINE BELOW
#   - name: saturday_open
# REMOVE THE # FROM THE LINE BELOW — edit days to match yours
#     days: [sat]
# REMOVE THE # FROM THE LINE BELOW — edit time to match yours
#     time: "10:00-16:00"
# REMOVE THE # FROM THE LINE BELOW
#     allowlist: allowlist.txt

# REMOVE THE # FROM THE LINE BELOW
#   - name: weekday_selfservice
# REMOVE THE # FROM THE LINE BELOW — edit days to match yours
#     days: [mon, tue, wed, thu, fri]
# REMOVE THE # FROM THE LINE BELOW — edit time to match yours
#     time: "07:00-09:00"
# REMOVE THE # FROM THE LINE BELOW
#     allowlist: allowlist_restricted.txt

# REMOVE THE # FROM THE LINE BELOW
#   - name: weekday_evening
# REMOVE THE # FROM THE LINE BELOW — edit days to match yours
#     days: [mon, tue, wed, thu, fri]
# REMOVE THE # FROM THE LINE BELOW — edit time to match yours
#     time: "19:00-21:00"
# REMOVE THE # FROM THE LINE BELOW
#     allowlist: allowlist_restricted.txt

# REMOVE THE # FROM THE LINE BELOW
#   - name: default
# REMOVE THE # FROM THE LINE BELOW — blocks all traffic outside defined hours
#     allowlist: none


# ------------------------------------------------------------
# SAFE SEARCH [PREMIUM · SafeDNS Guard required]
# Forces Google, Bing, and DuckDuckGo into safe/restricted mode
# via DNS rewriting. No client configuration needed.
# Recommended: true for libraries, schools, and care facilities.
# ------------------------------------------------------------
safe_search: false


# ------------------------------------------------------------
# YOUTUBE RESTRICTED MODE [PREMIUM · SafeDNS Guard required]
# Forces YouTube into restricted mode via DNS rewriting.
# Has no effect if youtube.com is not in your allowlist.
# ------------------------------------------------------------
youtube_restricted: false
